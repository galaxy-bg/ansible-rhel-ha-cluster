---
- name: Install HA cluster packages
  hosts: ha_cluster
  become: true
  tasks:
    - name: Enable required RHEL repositories
      community.general.rhsm_repository:
        name: "{{ item }}"
        state: enabled
      loop: "{{ rhel_repositories }}"
      failed_when: false

    - name: Install EPEL release from upstream RPM
      ansible.builtin.dnf:
        name: "{{ epel_release_url }}"
        state: present
        disable_gpg_check: true

    - name: Install OpenZFS repository
      ansible.builtin.dnf:
        name: "{{ zfs_release_url }}"
        state: present
        disable_gpg_check: true

    - name: Install cluster and storage packages
      ansible.builtin.dnf:
        name: "{{ cluster_packages }}"
        state: present

    - name: Enable pcsd
      ansible.builtin.service:
        name: pcsd
        enabled: true
        state: started

    - name: Enable iscsid
      ansible.builtin.service:
        name: iscsid
        enabled: true
        state: started

    - name: Check multipath configuration
      ansible.builtin.stat:
        path: /etc/multipath.conf
      register: multipath_conf

    - name: Create default multipath configuration
      ansible.builtin.command: mpathconf --enable --with_multipathd y
      when: not multipath_conf.stat.exists

    - name: Enable multipathd
      ansible.builtin.service:
        name: multipathd
        enabled: true
        state: started
      failed_when: false
