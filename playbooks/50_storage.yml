---
- name: Configure shared iSCSI and ZFS storage
  hosts: ha_cluster
  become: true
  tasks:
    - name: Enable iscsid service
      ansible.builtin.service:
        name: iscsid
        enabled: true
        state: started

    - name: Discover iSCSI target
      ansible.builtin.command: "iscsiadm -m discovery -t sendtargets -p {{ truenas_iscsi_portal }}"
      register: iscsi_discovery
      changed_when: false

    - name: Login to iSCSI target
      ansible.builtin.command: >
        iscsiadm -m node
        -T {{ iscsi_target_iqn }}
        -p {{ truenas_iscsi_portal }}:{{ truenas_iscsi_port }}
        --login
      register: iscsi_login
      changed_when: "'successful' in iscsi_login.stdout | lower"
      failed_when:
        - iscsi_login.rc != 0
        - "'already present' not in iscsi_login.stderr | lower"
        - "'already logged in' not in iscsi_login.stderr | lower"

    - name: Set iSCSI target automatic startup
      ansible.builtin.command: >
        iscsiadm -m node
        -T {{ iscsi_target_iqn }}
        -p {{ truenas_iscsi_portal }}:{{ truenas_iscsi_port }}
        --op update
        -n node.startup
        -v automatic
      changed_when: false

    - name: Wait for shared disk by-id path
      ansible.builtin.stat:
        path: "{{ zfs_disk_by_id }}"
      register: zfs_disk_path
      retries: 12
      delay: 5
      until: zfs_disk_path.stat.exists

    - name: Check if ZFS pool exists anywhere
      ansible.builtin.command: "zpool list -H -o name {{ zfs_pool_name }}"
      register: zpool_list
      changed_when: false
      failed_when: false

    - name: Check importable ZFS pools
      ansible.builtin.command: zpool import
      register: zpool_importable
      changed_when: false
      failed_when: false

    - name: Create ZFS pool on first node only
      ansible.builtin.command: >
        zpool create -f
        -o ashift={{ zfs_ashift }}
        {{ zfs_pool_name }}
        {{ zfs_disk_by_id }}
      when:
        - inventory_hostname == ansible_play_hosts_all[0]
        - zpool_list.rc != 0
        - zfs_pool_name not in zpool_importable.stdout

    - name: Create ZVOLs on first node only
      ansible.builtin.command: "zfs create -V {{ item.size }} {{ zfs_pool_name }}/{{ item.name }}"
      loop: "{{ zfs_zvols }}"
      when: inventory_hostname == ansible_play_hosts_all[0]
      register: zvol_create
      changed_when: zvol_create.rc == 0
      failed_when:
        - zvol_create.rc != 0
        - "'dataset already exists' not in zvol_create.stderr | lower"

    - name: Export pool before Pacemaker manages it
      ansible.builtin.command: "zpool export {{ zfs_pool_name }}"
      when: inventory_hostname == ansible_play_hosts_all[0]
      register: zpool_export
      changed_when: zpool_export.rc == 0
      failed_when:
        - zpool_export.rc != 0
        - "'no such pool' not in zpool_export.stderr | lower"
