---
- name: Configure Pacemaker constraints
  hosts: ha_cluster
  become: true
  tasks:
    - name: Read existing Pacemaker resources
      ansible.builtin.command: pcs resource config
      register: pcs_resource_config
      changed_when: false
      failed_when: false
      run_once: true

    - name: Verify resource group exists when group mode is enabled
      ansible.builtin.assert:
        that:
          - "'Group: ' ~ resource_group_name in pcs_resource_config.stdout"
          - "'zfs-pool' in pcs_resource_config.stdout"
          - vip_resource_name in pcs_resource_config.stdout
        fail_msg: "Resource group {{ resource_group_name }} bulunamadi. Once playbooks/60_resources.yml calistirilmali."
        quiet: true
      run_once: true
      when: resource_group_enabled | bool

    - name: Read existing Pacemaker constraints
      ansible.builtin.command: pcs constraint config
      register: pcs_constraint_config
      changed_when: false
      failed_when: false
      run_once: true
      when: not (resource_group_enabled | bool)

    - name: Add colocation constraint for VIP with ZFS pool
      ansible.builtin.command: "pcs constraint colocation add {{ vip_resource_name }} with zfs-pool INFINITY"
      run_once: true
      when:
        - not (resource_group_enabled | bool)
        - vip_resource_name not in pcs_constraint_config.stdout or 'zfs-pool' not in pcs_constraint_config.stdout or 'INFINITY' not in pcs_constraint_config.stdout
      register: colocation_add
      changed_when: colocation_add.rc == 0
      failed_when:
        - colocation_add.rc != 0
        - "'duplicate' not in colocation_add.stderr | lower"
        - "'already exists' not in colocation_add.stderr | lower"

    - name: Add order constraint for ZFS before VIP
      ansible.builtin.command: "pcs constraint order start zfs-pool then {{ vip_resource_name }}"
      run_once: true
      when:
        - not (resource_group_enabled | bool)
        - "'start zfs-pool then start ' ~ vip_resource_name not in pcs_constraint_config.stdout and 'zfs-pool then ' ~ vip_resource_name not in pcs_constraint_config.stdout"
      register: order_add
      changed_when: order_add.rc == 0
      failed_when:
        - order_add.rc != 0
        - "'duplicate' not in order_add.stderr | lower"
        - "'already exists' not in order_add.stderr | lower"
