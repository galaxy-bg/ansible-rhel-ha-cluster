---
- name: Set node hostname
  ansible.builtin.hostname:
    name: "{{ (cluster_nodes | selectattr('name', 'equalto', inventory_hostname) | first).fqdn }}"

- name: Manage cluster host records
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "^{{ item.public_ip | regex_escape() }}\\s+"
    line: "{{ item.public_ip }} {{ item.fqdn }} {{ item.name }}"
    state: present
  loop: "{{ cluster_nodes }}"

- name: Disable SSH DNS lookup delay
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?UseDNS\s+'
    line: 'UseDNS no'
    validate: /usr/sbin/sshd -t -f %s
  notify: Restart sshd

- name: Check Secure Boot state
  ansible.builtin.command: mokutil --sb-state
  register: secure_boot_state
  changed_when: false
  failed_when: false

- name: Warn if Secure Boot is enabled
  ansible.builtin.debug:
    msg: "Secure Boot enabled gorunuyor. OpenZFS DKMS kurulumu icin disable edilmesi onerilir."
  when: secure_boot_state.rc == 0 and "'secureboot enabled' in (secure_boot_state.stdout | lower)"
